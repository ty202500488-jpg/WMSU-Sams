<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Duty Referral | WMSU-SAMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="form.css">
    <style>
        /* UI Enhancements */
        .name-grid { display: grid; grid-template-columns: 2fr 1fr 2fr; gap: 15px; }
        
        .employer-lock {
            background-color: #fff9db;
            border: 2px dashed #fcc419;
            position: relative;
            margin-top: 20px;
        }
        
        .employer-lock::before {
            content: "OFFICIAL USE ONLY";
            position: absolute;
            top: -12px;
            right: 20px;
            background: #fcc419;
            color: #856404;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 10px;
            border-radius: 4px;
        }

        .instruction-tag {
            font-size: 12px;
            color: #720b0b; /* WMSU Crimson */
            margin-bottom: 10px;
            display: block;
            font-style: italic;
        }

        .total-display {
            background: #f4f7f6;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #dcdde1;
            margin-top: 10px;
        }

        .total-display span {
            font-size: 24px;
            font-weight: 700;
            color: #720b0b;
        }

        @media (max-width: 600px) {
            .name-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="return-btn">
        <a href="student_dashboard.html"><i class="fa-solid fa-arrow-left"></i> </a>
    </div>

    <div class="form-wrapper">
        <header class="cppeso-header">
            <div class="header-content">
                <img src="../Images/wmsu.jpg.jpg" alt="WMSU Logo" class="form-logo">
                <div class="title-area">
                    <h1>Duty Referral & Log</h1>
                    <p>CPPESO Student Assistant Monitoring</p>
                </div>
            </div>
        </header>

        <form id="referralForm" action="submit_referral.php" method="POST">
            
            <section class="form-card">
                <h2 class="section-title"><i class="fa-solid fa-address-card"></i> Personal Information</h2>
                
                <div class="input-row">
                    <div class="field">
                        <label>First Name</label>
                        <input type="text" name="first_name" placeholder="Required" value="Juan">
                    </div>
                    <div class="field">
                        <label>Middle Name</label>
                        <input type="text" name="middle_name" placeholder="Optional" value="Dela">
                    </div>
                    <div class="field">
                        <label>Last Name</label>
                        <input type="text" name="last_name" placeholder="Required" value="Cruz">
                    </div>
                </div>

                <div class="input-row split-2-1">
                    <div class="field">
                        <label>Student ID Number</label>
                        <input type="text" name="student_id" placeholder="e.g., 2021-01234" value="2023-10452">
                    </div>
                    <div class="field">
                        <label>Date of Birth</label>
                        <input type="date" name="dob" value="2003-01-10" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="field">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="name@wmsu.edu.ph" value="juan@email.com">
                    </div>
                    <div class="field">
                        <label>Contact Number</label>
                        <input type="tel" name="contact" placeholder="09XXXXXXXXX" value="09123456789">
                    </div>
                </div>
            </section>

            <section class="form-card">
                <h2 class="section-title"><i class="fa-solid fa-graduation-cap"></i> Academic Information</h2>
                <div class="input-row">
                    <div class="field">
                        <label>Course</label>
                        <select name="course" required>
                            <option value="" disabled>Select Course</option>
                            <option selected>Bachelor of Science in Computer Science</option>
                            <option>Bachelor of Science in Information Technology</option>
                            <option>Bachelor of Arts in Psychology</option>
                            <option>College of Liberal Arts</option>
                            </select>
                    </div>
                </div>
                <div class="input-row grid-3">
                    <div class="field">
                        <label>Year Level</label>
                        <select name="year_level" required>
                            <option>1st Year</option>
                            <option>2nd Year</option>
                            <option selected>3rd Year</option>
                            <option>4th Year</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Semester</label>
                        <select name="semester" required>
                            <option selected>First Semester</option>
                            <option>Second Semester</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Latest GPA</label>
                        <input type="number" step="0.01" name="gpa" placeholder="0.00" required>
                    </div>
                </div>
            </section>

            <section class="form-card">
                <h2 class="section-title"><i class="fa-solid fa-calendar-day"></i> 2. Duty Details</h2>
                <span class="instruction-tag">Student: Record your exact rendered hours.</span>
                
                <div class="input-row">
                    <div class="field">
                        <label>Date of Duty</label>
                        <input type="date" name="duty_date" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="field">
                        <label>Time In</label>
                        <input type="time" name="time_in" id="t_in" required>
                    </div>
                    <div class="field">
                        <label>Time Out</label>
                        <input type="time" name="time_out" id="t_out" required>
                    </div>
                </div>

                <div class="total-display">
                    <label>Total Rendered Hours</label><br>
                    <span id="rendered_hours">0.00</span>
                </div>
            </section>

            <div class="declaration">
                <label class="checkbox-wrapper">
                    <input type="checkbox" required>
                    <span class="checkmark"></span>
                    <p>I confirm that the information above is true and verified by my supervisor.</p>
                </label>
            </div>

            <button type="submit" class="submit-btn">
                Submit Referral Slip
            </button>
        </form>
    </div>

    <script>
        const inTime = document.getElementById('t_in');
        const outTime = document.getElementById('t_out');
        const display = document.getElementById('rendered_hours');
        const form = document.getElementById('referralForm');

        // Logic for calculating hours
        function calc() {
            if (inTime.value && outTime.value) {
                const s = new Date(`2026-01-01 ${inTime.value}`);
                const e = new Date(`2026-01-01 ${outTime.value}`);
                let d = (e - s) / 1000 / 60 / 60;
                if (d < 0) d += 24; 
                display.innerText = d.toFixed(2);
            }
        }

        inTime.addEventListener('change', calc);
        outTime.addEventListener('change', calc);

        // Submit Handler
        form.addEventListener('submit', function(event) {
            // If you want to use PHP, remove preventDefault(). 
            // If this is just a demo/prototype, keep it to see the redirect.
            event.preventDefault(); 
            
            console.log("Form submitted successfully!");
            window.location.href = "referral-success.html";
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance | WMSU-SAMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="form.css"> <!-- Your existing CSS -->
    <script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>
    <style>
        /* WMSU-SAMS Scanner Specific UI */
        .scanner-section {
            text-align: center;
            padding: 20px 10px;
        }

        .camera-container {
            position: relative;
            width: 100%;
            height: 370px;
            max-width: 380px;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            border: 5px solid #720b0b; /* WMSU Crimson */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        #preview {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        /* The "Scan Frame" Overlay */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .guide-box {
            width: 65%;
            height: 65%;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5);
        }

        /* Result Display (Matches your total-display style) */
        .status-card {
            background: #f4f7f6;
            padding: 20px;
            border-radius: 8px;
            margin-top: 25px;
            border: 1px solid #dcdde1;
            transition: all 0.3s ease;
        }

        .status-card i {
            font-size: 28px;
            margin-bottom: 10px;
            display: block;
        }

        .status-card.success {
            background: #ebfbee;
            border-color: #2b8a3e;
            color: #2b8a3e;
        }

        .status-card.error {
            background: #fff5f5;
            border-color: #c92a2a;
            color: #c92a2a;
        }

        .scanning-text {
            color: #720b0b;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0.2; } }

        .hidden { display: none; }
    </style>
</head>

<body>

    <div class="return-btn">
        <a href="student_dashboard.html"><i class="fa-solid fa-arrow-left"></i> </a>
    </div>

    <div class="form-wrapper">
        <!-- Header copied from your design -->
        <header class="cppeso-header">
            <div class="header-content">
                <img src="../Images/wmsu.jpg.jpg" alt="WMSU Logo" class="form-logo">
                <div class="title-area">
                    <h1>Daily Duty Scan</h1>
                    <p>CPPESO Student Assistant Monitoring</p>
                </div>
            </div>
        </header>

        <section class="form-card">
            <h2 class="section-title"><i class="fa-solid fa-camera"></i> Attendance Scanner</h2>
            <span class="instruction-tag">Point your camera at the official classroom QR code.</span>

            <div class="scanner-section">
                <!-- Camera Viewport -->
                <div class="camera-container">
                    <video id="preview"></video>
                    <div class="overlay">
                        <div class="guide-box"></div>
                    </div>
                </div>

                <!-- Status Feedback Area -->
                <div id="feedback" class="status-card">
                    <div id="searching">
                        <i class="fa-solid fa-qrcode fa-beat-fade" style="color: #720b0b;"></i>
                        <span class="scanning-text">Searching for QR Code...</span>
                    </div>

                    <div id="result-content" class="hidden">
                        <i id="result-icon"></i>
                        <span id="result-text" style="font-size: 18px; font-weight: 700;"></span>
                        <p id="result-subtext" style="margin-top: 5px; font-size: 14px; opacity: 0.8;"></p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
          /**
         * WMSU-SAMS QR Scanner Logic (Laptop Optimized)
         */

        // 1. DOM Elements
        const videoPreview = document.getElementById('preview');
        const feedbackContainer = document.getElementById('feedback');
        const searchingState = document.getElementById('searching');
        const resultContent = document.getElementById('result-content');
        const resultIcon = document.getElementById('result-icon');
        const resultText = document.getElementById('result-text');
        const resultSubtext = document.getElementById('result-subtext');

        // 2. Initialize Scanner for Laptop
        // We set 'mirror: true' so the student sees themselves naturally
        let scanner = new Instascan.Scanner({ 
            video: videoPreview,
            mirror: true 
        });

        // 3. Scan Event
        scanner.addListener('scan', function (content) {
            processAttendance(content);
        });

        // 4. Access Laptop Camera
        async function initLaptopCamera() {
            try {
                const cameras = await Instascan.Camera.getCameras();
                
                if (cameras.length > 0) {
                    // Laptops usually only have 1 camera (index 0)
                    // We use the first one detected
                    await scanner.start(cameras[0]);
                    updateUIState('searching');
                } else {
                    showError("No WebCam Detected", "Please plug in or enable your laptop camera.");
                }
            } catch (error) {
                // This triggers if the student clicks 'Block' on the browser popup
                showError("Access Denied", "Click the 'Camera Icon' in your browser address bar to allow access.");
            }
        }

        // 5. Attendance Processing
        async function processAttendance(token) {
            updateUIState('processing');

            try {
                // Simulated Backend validation
                const result = await simulateServerResponse(token);

                if (result.success) {
                    showSuccess(result.message, result.time);
                    setTimeout(() => { window.location.href = "student_dashboard.html"; }, 3000);
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                showError("Invalid Scan", err.message);
                setTimeout(() => updateUIState('searching'), 3000);
            }
        }

        // 6. UI State Controller
        function updateUIState(state) {
            searchingState.classList.add('hidden');
            resultContent.classList.add('hidden');
            feedbackContainer.className = "status-card";

            if (state === 'searching') {
                searchingState.classList.remove('hidden');
            } else if (state === 'processing') {
                resultContent.classList.remove('hidden');
                resultIcon.className = "fa-solid fa-spinner fa-spin";
                resultText.innerText = "Validating...";
                resultSubtext.innerText = "Verifying with CPPESO servers...";
            }
        }

        function showSuccess(message, time) {
            feedbackContainer.classList.add('success');
            resultContent.classList.remove('hidden');
            resultIcon.className = "fa-solid fa-circle-check";
            resultText.innerText = message;
            resultSubtext.innerText = `Logged at: ${time}`;
        }

        function showError(title, message) {
            feedbackContainer.classList.add('error');
            resultContent.classList.remove('hidden');
            resultIcon.className = "fa-solid fa-circle-xmark";
            resultText.innerText = title;
            resultSubtext.innerText = message;
        }

        // Mock Server Helper
        function simulateServerResponse(token) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve({ 
                        success: true, 
                        message: "Time Recorded!", 
                        time: new Date().toLocaleTimeString() 
                    });
                }, 1500);
            });
        }

        // Start on load
        window.addEventListener('load', initLaptopCamera);
    </script>
</body>

</html>

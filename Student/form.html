<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPPESO Student Collection | WMSU-SAMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="form.css">
</head>

<body>

    <div class="return-btn">
        <a href="positions.html"><i class="fa-solid fa-arrow-left"></i> </a>
    </div>

    <div class="form-wrapper">
        <header class="cppeso-header">
            <div class="header-content">
                <img src="../Images/wmsu.jpg.jpg" alt="WMSU Logo" class="form-logo">
                <div class="title-area">
                    <h1>CPPESO Student Application Form</h1>
                    <p>Student Assistant Information Collection</p>
                </div>
            </div>
        </header>

        <form id="applicationForm" action="application_success.html" method="POST" enctype="multipart/form-data">

            <section class="form-card">
                <h2 class="section-title"><i class="fa-solid fa-address-card"></i> Personal Information</h2>

                <div class="input-row">
                    <div class="field">
                        <label>First Name</label>
                        <input type="text" name="first_name" placeholder="Required" value="Juan" required>
                    </div>
                    <div class="field">
                        <label>Middle Name</label>
                        <input type="text" name="middle_name" placeholder="Optional" value="Dela">
                    </div>
                    <div class="field">
                        <label>Last Name</label>
                        <input type="text" name="last_name" placeholder="Required" value="Cruz" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="field">
                        <label>Barangay</label>
                        <input type="text" name="barangay" placeholder="Required" value="San Roque" required>
                    </div>
                    <div class="field">
                        <label>Street/House No.</label>
                        <input type="text" name="street" placeholder="Required" value="House 123, Street 456" required>
                    </div>
                    <div class="field">
                        <label>City</label>
                        <input type="text" name="city" placeholder="Required" value="Zamboanga City" required>
                    </div>
                </div>

                <div class="input-row split-2-1">
                    <div class="field">
                        <label>Student ID Number</label>
                        <input type="text" name="student_id" placeholder="e.g., 2021-01234" value="2023-10452" required>
                    </div>
                    <div class="field">
                        <label>Date of Birth</label>
                        <input type="date" name="dob" value="2003-01-10" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="field">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="name@wmsu.edu.ph" value="juan@email.com" required>
                    </div>
                    <div class="field">
                        <label>Contact Number</label>
                        <input type="tel" name="contact" placeholder="09XXXXXXXXX" value="09123456789" required>
                    </div>
                </div>
            </section>

            <section class="form-card">
                <h2 class="section-title"><i class="fa-solid fa-graduation-cap"></i> Academic Information</h2>
                <div class="academic-grid">
                    <div class="field">
                        <label>Department</label>
                        <select id="department" name="department" required>
                            <option value="" disabled selected>Select Department</option>
                            <option value="law">College of Law</option>
                            <option value="coa">College of Agricultue</option>
                            <option value="cla">College of Liberal Arts</option>
                            <option value="architecture">College of Architecture</option>
                            <option value="cn">College of Nursing</option> 
                            <option value="cais">College of Asian & Islamic Studies</option>
                            <option value="ccs">College of Computer Science</option>
                            <option value="cfes">College of Forestry & Environmental Studies</option>
                            <option value="ccje">College of Criminal Justice Education</option>
                            <option value="che">College of Home Economics</option>
                            <option value="coe">College of Engineering</option>
                            <option value="cm">College of Medicine</option>
                            <option value="cpads">College of Public Administration & Development Studies</option>
                            <option value="csspe">College of Sports Science & Physical Education</option>
                            <option value="csm">College of Science & Mathematics</option>
                            <option value="cswcd">College of Social Work & Community Development</option>
                            <option value="cte">College of Teacher Education</option>
                        </select>
                    </div>    

                        <div class="field">
                            <label>Program</label>
                            <select id="program" name="program" required>
                                <option value="" disabled selected>Select Program</option>
                            </select>
                        </div>                   
                </div>
                <div class="input-row grid-3">
                    <div class="field">
                        <label>Year Level</label>
                        <select name="year_level" required>
                            <option>1st Year</option>
                            <option>2nd Year</option>
                            <option selected>3rd Year</option>
                            <option>4th Year</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Semester</label>
                        <select name="semester" required>
                            <option selected>First Semester</option>
                            <option>Second Semester</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="form-card">
                <div class="card-header">
                    <h2 class="section-title"><i class="fa-solid fa-calendar-check"></i> Duty Availability</h2>
                    <p class="section-hint">Check the days you are available and specify your class-free hours.</p>
                </div>

                <div class="schedule-grid">
                    <div class="day-row">
                        <div class="day-selector">
                            <input type="checkbox" id="mon" class="day-check" required>
                            <label for="mon" class="day-label">
                                <span class="custom-check"></span>
                                Monday
                            </label>
                        </div>

                        <div class="time-fields">
                            <div class="time-input-group">
                                <label>From</label>
                                <input type="time" name="mon_start">
                            </div>

                            <span class="time-separator">to</span>
                            <div class="time-input-group">
                                <input type="time" name="mon_end">
                            </div>
                        </div>
                    </div>


                    <div class="day-row">
                        <div class="day-selector">
                            <input type="checkbox" id="tue" class="day-check">
                            <label for="tue" class="day-label">
                                <span class="custom-check"></span>
                                Tuesday
                            </label>
                        </div>

                        <div class="time-fields">
                            <div class="time-input-group">
                                <label>From</label>
                                <input type="time" name="tue_start">
                            </div>

                            <span class="time-separator">to</span>
                            <div class="time-input-group">
                                <input type="time" name="tue_end">

                            </div>
                        </div>
                    </div>

                    <div class="day-row">
                        <div class="day-selector">
                            <input type="checkbox" id="wed" class="day-check">
                            <label for="wed" class="day-label">
                                <span class="custom-check"></span>
                                Wednesday
                            </label>
                        </div>

                        <div class="time-fields">
                            <div class="time-input-group">
                                <label>From</label>
                                <input type="time" name="wed_start">
                            </div>

                            <span class="time-separator">to</span>
                            <div class="time-input-group">
                                <input type="time" name="wed_end">
                            </div>
                        </div>
                    </div>

                    <div class="day-row">
                        <div class="day-selector">
                            <input type="checkbox" id="thu" class="day-check">
                            <label for="thu" class="day-label">
                                <span class="custom-check"></span>
                                Thursday
                            </label>
                        </div>
                        <div class="time-fields">
                            <div class="time-input-group">
                                <label>From</label>
                                <input type="time" name="thu_start">
                            </div>
                            <span class="time-separator">to</span>
                            <div class="time-input-group">
                                <input type="time" name="thu_end">
                            </div>
                        </div>
                    </div>


                    <div class="day-row">
                        <div class="day-selector">
                            <input type="checkbox" id="fri" class="day-check">
                            <label for="fri" class="day-label">
                                <span class="custom-check"></span>
                                Friday
                            </label>
                        </div>
                        <div class="time-fields">
                            <div class="time-input-group">
                                <label>From</label>
                                <input type="time" name="fri_start">
                            </div>
                            <span class="time-separator">to</span>
                            <div class="time-input-group">
                                <input type="time" name="fri_end">
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="form-card">
                <h2 class="section-title"><i class="fa-solid fa-file-arrow-up"></i> Required Documents</h2>
                <div class="upload-container">
                    <label class="upload-box">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>Upload Certificate of Registration (COR)</span>
                        <small>PDF format only • Max 5MB</small>
                        <input type="file" name="cor_file" accept=".pdf">
                    </label>
                </div>
                <div class="upload-container">
                    <label class="upload-box">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>Upload Latest GPA</span>
                        <small>PDF format only • Max 5MB</small>
                        <input type="file" name="gpa_file" accept=".pdf">
                    </label>
                </div>
                <div class="upload-container">
                    <label class="upload-box">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>Upload Resume</span>
                        <small>PDF format only • Max 5MB</small>
                        <input type="file" name="resume_file" accept=".pdf">
                    </label>
                </div>
                <div class="upload-container">
                    <label class="upload-box">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>Upload ITR/Certificate of Indigency</span>
                        <small>PDF format only • Max 5MB</small>
                        <input type="file" name="itr_file" accept=".pdf">
                    </label>
                </div>
                <div class="upload-container">
                    <label class="upload-box">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>Upload Prospectus</span>
                        <small>PDF format only • Max 5MB</small>
                        <input type="file" name="prospectus_file" accept=".pdf">
                    </label>
                </div>
            </section>

            <div class="declaration">
                <label class="checkbox-wrapper">
                    <input type="checkbox" id="termsCheckbox" required>
                    <span class="checkmark"></span>
                    <p>I hereby certify that the information provided is true and correct to the best of my knowledge
                        for CPPESO verification.</p>
                </label>
            </div>

            <button type="submit" class="submit-btn">
                Submit Application
            </button>
        </form>
    </div>
    <script>
const programs = {
    law: [
        "BS Laws"
    ],
    coa: [
        "BS Agriculture",
        "BS Food Technology",
        "BS Agribusiness",
        "Bachelor of Agricultural Technology"
    ],
    cais: [
        "Asian and Islamic Studies"
    ],
    cfes: [
        "BS Forestry",
        "BS Agrefoestry",
        "BS Environment Sciece"
    ],
    ccje: [
        "Criminal Justice Education"
    ],
  coe: [
    "Agricultural and Biosystems Engineering",
    "BS Civil Engineering",
    "BS Computer Engineering",
    "BS Electrical Engineering",
    "BS Electronics Engineering",
    "BS Environmental Engineering",
    "BS Geodetiv Engineering",
    "BS Industrial Engineering",
    "Mechanical Engineering",
    "BS Sanitary Engineering",
  ],
  ccs: [
    "BSCS",
    "BSIT",
    "ACT AD",
    "ACT NT"
  ],
  cn: [
    "BS Nursing"
  ],
  architecture: [
    "BS Architecture"
  ],
  agriculture: [
    "BS Agriculture",
    "BS Agribusiness"
  ],
  cla: [
    "BS Accountancy",
    "BA Histroy",
    "BA English",
    "BA Political Science",
    "BA Mass Communication- Journalism",
    "BA Mass Communication- Broadcasting",
    "BS Economics",
    "BS Psychology"
  ],
  che: [
    "BS Home Economics",
    "Nutrition & Dietetics",
    "BS Hosipitality Management"
  ],
cm: [
    ""
],
cpads: [
    "BS Public Administration"
],
csspe: [
    "BS Physical Education",
    "BS Exercise & Sports Sciences"
],
csm: [
    "BS Biology",
    "BS Chemistry",
    "BS Mathematics",
    "BS Statistics",
    "BS Physics"
],
cswcd: [
    "BS Social Work",
    "BS Community Development"
],
cte: [
    "Bachelor of Culture and Arts Education",
    "Bachelor of Early Childhood Education",
    "Bachelor of Elementary Education",
    "Bacher of Secondary Education- English",
    "Bacher of Secondary Education- Filipino",
    "Bacher of Secondary Education- Mathematics",
    "Bacher of Secondary Education- Sciences",
    "Bacher of Secondary Education- Social Studies",
    "Bacher of Secondary Education- Values Education",
    "Bachelor of Special Needs Education"
]
};

const departmentSelect = document.getElementById("department");
const programSelect = document.getElementById("program");

departmentSelect.addEventListener("change", function () {
  const selected = this.value;

  programSelect.innerHTML = '<option value="">Select Program</option>';

  if (programs[selected]) {
    programs[selected].forEach(prog => {
      const option = document.createElement("option");
      option.value = prog;
      option.textContent = prog;
      programSelect.appendChild(option);
    });
  }
});
</script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPPESO Student Collection | WMSU-SAMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="form.css">
</head>
<body>

    <div class="return-btn">
        <a href="positions.html"><i class="fa-solid fa-arrow-left"></i> </a>
    </div>

    <div class="form-wrapper">
        <header class="cppeso-header">
            <div class="header-content">
                <img src="Images/wmsu.jpg.jpg" alt="WMSU Logo" class="form-logo">
                <div class="title-area">
                    <h1>CPPESO Student Application Form</h1>
                    <p>Student Assistant Information Collection</p>
                </div>
            </div>
        </header>

        <form action="application_success.html" method="POST" enctype="multipart/form-data">
            
            <section class="form-card">
                <h2 class="section-title"><i class="fa-solid fa-address-card"></i> Personal Information</h2>
                <div class="input-row">
                    <div class="field">
                        <label>First Name</label>
                        <input type="text" name="first_name" placeholder="Required" required>
                    </div>
                    <div class="field">
                        <label>Middle Name</label>
                        <input type="text" name="middle_name" placeholder="Optional">
                    </div>
                    <div class="field">
                        <label>Last Name</label>
                        <input type="text" name="last_name" placeholder="Required" required>
                    </div>
                </div>

                <div class="input-row split-2-1">
                    <div class="field">
                        <label>Student ID Number</label>
                        <input type="text" name="student_id" placeholder="e.g., 2021-01234" required>
                    </div>
                    <div class="field">
                        <label>Date of Birth</label>
                        <input type="date" name="dob" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="field">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="name@wmsu.edu.ph" required>
                    </div>
                    <div class="field">
                        <label>Contact Number</label>
                        <input type="tel" name="contact" placeholder="09XXXXXXXXX" required>
                    </div>
                </div>
            </section>

            <section class="form-card">
                <h2 class="section-title"><i class="fa-solid fa-graduation-cap"></i> Academic Information</h2>
                <div class="input-row">
                    <div class="field">
                        <label>College Department</label>
                        <select name="college" required>
                            <option value="" disabled selected>Select College</option>
                            <option>College of Computing Studies</option>
                            <option>College of Engineering</option>
                            <option>College of Nursing</option>
                            <option>College of Liberal Arts</option>
                            </select>
                    </div>
                </div>
                <div class="input-row grid-3">
                    <div class="field">
                        <label>Year Level</label>
                        <select name="year_level" required>
                            <option>1st Year</option>
                            <option>2nd Year</option>
                            <option>3rd Year</option>
                            <option>4th Year</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Semester</label>
                        <select name="semester" required>
                            <option>First Semester</option>
                            <option>Second Semester</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Latest GPA</label>
                        <input type="number" step="0.01" name="gpa" placeholder="0.00" required>
                    </div>
                </div>
            </section>

            <section class="form-card">
    <div class="card-header">
        <h2 class="section-title"><i class="fa-solid fa-calendar-check"></i> Duty Availability</h2>
        <p class="section-hint">Check the days you are available and specify your class-free hours.</p>
    </div>
    
    <div class="schedule-grid">
        <div class="day-row">
            <div class="day-selector">
                <input type="checkbox" id="mon" class="day-check">
                <label for="mon" class="day-label">
                    <span class="custom-check"></span>
                    Monday
                </label>
            </div>
            <div class="time-fields">
                <div class="time-input-group">
                    <label>From</label>
                    <input type="time" name="mon_start">
                </div>
                <span class="time-separator">to</span>
                <div class="time-input-group">
                    <input type="time" name="mon_end">
                </div>
            </div>
        </div>

        <div class="day-row">
            <div class="day-selector">
                <input type="checkbox" id="tue" class="day-check">
                <label for="tue" class="day-label">
                    <span class="custom-check"></span>
                    Tuesday
                </label>
            </div>
            <div class="time-fields">
                <div class="time-input-group">
                    <label>From</label>
                    <input type="time" name="tue_start">
                </div>
                <span class="time-separator">to</span>
                <div class="time-input-group">
                    <input type="time" name="tue_end">
                </div>
            </div>
        </div>

        <div class="day-row">
            <div class="day-selector">
                <input type="checkbox" id="wed" class="day-check">
                <label for="wed" class="day-label">
                    <span class="custom-check"></span>
                    Wednesday
                </label>
            </div>
            <div class="time-fields">
                <div class="time-input-group">
                    <label>From</label>
                    <input type="time" name="wed_start">
                </div>
                <span class="time-separator">to</span>
                <div class="time-input-group">
                    <input type="time" name="wed_end">
                </div>
            </div>
        </div>

        <div class="day-row">
            <div class="day-selector">
                <input type="checkbox" id="thu" class="day-check">
                <label for="thu" class="day-label">
                    <span class="custom-check"></span>
                    Thursday
                </label>
            </div>
            <div class="time-fields">
                <div class="time-input-group">
                    <label>From</label>
                    <input type="time" name="thu_start">
                </div>
                <span class="time-separator">to</span>
                <div class="time-input-group">
                    <input type="time" name="thu_end">
                </div>
            </div>
        </div>

        <div class="day-row">
            <div class="day-selector">
                <input type="checkbox" id="fri" class="day-check">
                <label for="fri" class="day-label">
                    <span class="custom-check"></span>
                    Friday
                </label>
            </div>
            <div class="time-fields">
                <div class="time-input-group">
                    <label>From</label>
                    <input type="time" name="fri_start">
                </div>
                <span class="time-separator">to</span>
                <div class="time-input-group">
                    <input type="time" name="fri_end">
                </div>
            </div>
        </div>
    </div>
</section>

            <section class="form-card">
                <h2 class="section-title"><i class="fa-solid fa-file-arrow-up"></i> Required Documents</h2>
                <div class="upload-container">
                    <label class="upload-box">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>Upload Certificate of Registration (COR)</span>
                        <small>PDF format only • Max 5MB</small>
                        <input type="file" name="cor_file" accept=".pdf" required>
                    </label>
                </div>
            </section>

            <div class="declaration">
                <label class="checkbox-wrapper">
                    <input type="checkbox" required>
                    <span class="checkmark"></span>
                    <p>I hereby certify that the information provided is true and correct to the best of my knowledge for CPPESO verification.</p>
                </label>
            </div>

            <button type="submit" class="submit-btn">
                <span>Submit Application</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Student Sign-In</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="validation.js"></script>
    <style>
        .step-indicator {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .step-indicator span {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            background: #e0e0e0;
            color: #666;
        }
        .step-indicator span.active {
            background: #720b0b;
            color: white;
        }
        .step-indicator span.completed {
            background: #15803d;
            color: white;
        }
        .form-step {
            display: none;
        }
        .form-step.active {
            display: block;
        }
        .step-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
        .resend-otp {
            text-align: center;
            margin-top: 10px;
        }
        .resend-otp a {
            color: #720b0b;
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
        }
        .resend-otp a:hover {
            text-decoration: underline;
        }
        .forgot-form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .forgot-form-actions a {
            flex: 1;
            text-align: center;
        }
        .back-to-login {
            text-align: center;
            margin-top: 15px;
        }
        .back-to-login a {
            color: #720b0b;
            text-decoration: none;
            font-size: 13px;
        }
        .back-to-login a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <!-- Return button -->
    <div class="return-btn">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
    </div>

    <!-- Background -->
    <div class="background"></div>

    <div class="container">
        <div class="container-inner">
            <!-- Left side image/logo -->
            <div class="image">
                <div class="logo-container">
                    <div class="logo"></div>
                </div>
                <div class="signup-link">
                    <a href="login.html">Back to Login</a>
                </div>
            </div>

            <!-- Right side password reset form -->
            <div class="login-form">
                <h1>Reset Your Password</h1>

                <!-- Step Indicator -->
                <div class="step-indicator">
                    <span class="active" id="step-1-indicator">1</span>
                    <span id="step-2-indicator">2</span>
                    <span id="step-3-indicator">3</span>
                </div>

                <!-- STEP 1: Email Entry -->
                <div id="step1" class="form-step active">
                    <div class="step-title">Enter Your Email Address</div>
                    <label for="forgot-email">Email</label>
                    <input type="email" id="forgot-email" placeholder="example@wmsu.edu.ph">
                    <button id="send-otp-btn" style="width: 100%; padding: 12px; margin-top: 15px; background: #720b0b; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.3s;">Send OTP</button>
                    <div class="back-to-login">
                        <a href="login.html">Back to Login</a>
                    </div>
                </div>

                <!-- STEP 2: OTP Verification -->
                <div id="step2" class="form-step">
                    <div class="step-title">Enter the OTP Sent to Your Email</div>
                    <label for="otp-input">One-Time Password (OTP)</label>
                    <input type="text" id="otp-input" placeholder="Enter 6-digit OTP" maxlength="6" inputmode="numeric">
                    <p style="font-size: 12px; color: #666; margin-top: 8px; text-align: center;">Demo OTP: <strong>123456</strong></p>
                    <button id="verify-otp-btn" style="width: 100%; padding: 12px; margin-top: 15px; background: #720b0b; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.3s;">Verify OTP</button>
                    <div class="resend-otp">
                        <p style="font-size: 13px; color: #666;">Didn't receive the OTP?</p>
                        <a id="resend-otp-link">Resend OTP</a>
                    </div>
                </div>

                <!-- STEP 3: New Password -->
                <div id="step3" class="form-step">
                    <div class="step-title">Create a New Password</div>
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" placeholder="Enter new password (min 8 characters)">

                    <label for="confirm-new-password">Confirm Password</label>
                    <input type="password" id="confirm-new-password" placeholder="Confirm your new password">

                    <button id="reset-password-btn" style="width: 100%; padding: 12px; margin-top: 15px; background: #720b0b; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.3s;">Reset Password</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="registration.css">
</head>

<body>
        <!-- RADIO CONTROLS -->
        <input type="radio" name="role" id="student" class="role-select" checked>
        <input type="radio" name="role" id="employer" class="role-select">
        <input type="radio" name="role" id="cppeso" class="role-select">

        <div class="return-btn">
            <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
        </div>

        <div class="background"></div>

        <div class="container">
        <div class="register-card">

        <h1>Create Account</h1>

        <!-- ACCOUNT TYPE BUTTONS -->
        <div class="account-type">
            <label for="student" class="type-btn">Student</label>
            <label for="employer" class="type-btn">Employer</label>
            <label for="cppeso" class="type-btn">CPPESO</label>
        </div>

        <!-- STUDENT FORM -->
        <form id="studentForm" class="account-form" action="registration_submitted.html">

            <label>Full Name</label>
            <input type="text" required>

            <label>Email</label>
            <input type="email" required>

            <div class="row">
                <div>
                    <label>Student ID</label>
                    <input type="text" required>
                </div>
                <div>
                    <label>Year Level</label>
                    <input type="text" required>
                </div>
            </div>

            <label>Course</label>
            <input type="text" required>

            <label>Password</label>
            <input type="password" required>

            <label>Confirm Password</label>
            <input type="password" required>

            <a id="register-btn" href="registration_submitted.html">Register</a>

        </form>

        <!-- EMPLOYER FORM -->
        <form id="employerForm" class="account-form" action="registration_submitted.html">

            <label>Full Name</label>
            <input type="text" required>

            <label>Department</label>
            <input type="text" required>

            <label>Email</label>
            <input type="email" required>

            <label>Contact Number</label>
            <input type="text" required>

            <label>Password</label>
            <input type="password" required>

            <label>Confirm Password</label>
            <input type="password" required>

            <a id="register-btn" href="registration_submitted.html">Register</a>

        </form>

        <!-- CPPESO FORM -->
        <form id="cppesoForm" class="account-form" action="registration_submitted.html">

            <label>Full Name</label>
            <input type="text" required>

            <label>Email</label>
            <input type="email" required>

            <label>Password</label>
            <input type="password" required>

            <label>Confirm Password</label>
            <input type="password" required>

            <label>Authorization Code</label>
            <input type="text" required>

             <a id="register-btn" href="registration_submitted.html">Register</a>

        </form>
    </div>

</body>

</html>

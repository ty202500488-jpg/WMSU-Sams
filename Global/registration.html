<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="registration.css">
    <script src="validation.js"></script>
</head>

<body>
        <!-- RADIO CONTROLS -->
        <input type="radio" name="role" id="student" class="role-select" checked>
        <input type="radio" name="role" id="employer" class="role-select">
        <input type="radio" name="role" id="cppeso" class="role-select">

        <div class="return-btn">
            <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
        </div>

        <div class="background"></div>

        <div class="container">
        <div class="register-card">

        <h1>Create Account</h1>

        <!-- ACCOUNT TYPE BUTTONS -->
        <div class="account-type">
            <label for="student" class="type-btn">Student</label>
            <label for="employer" class="type-btn">Department</label>
            <label for="cppeso" class="type-btn">CPPESO</label>
        </div>

        <!-- STUDENT FORM -->
            <form id="studentForm" class="account-form" action="submitted.html" method="POST">
             <div class="input-row">
                    <div class="field">
                        <label>First Name</label>
                        <input type="text" name="first_name" placeholder="Enter First Name">
                    </div>
                    <div class="field">
                        <label>Middle Name</label>
                        <input type="text" name="middle_name" placeholder="Enter Middle Initial">
                    </div>
                    <div class="field">
                        <label>Last Name</label>
                        <input type="text" name="last_name" placeholder="Enter Last Name">
                    </div>
                </div>

            <label>Official WMSU Email</label>
            <input type="email" placeholder="username@wmsu.edu.ph">

            <div class="row">
                <div>
                    <label>Student ID</label>
                    <input type="text" inputmode="numeric" pattern="[0-9-]*" placeholder="2023-01234">
                </div>
                <div>
                    <label>Year Level</label>
                    <select required>
                        <option value="" disabled selected>Select Year</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
            </div>

            <label>Password</label>
            <input type="password" minlength="8" placeholder="Enter Password">

            <label>Confirm Password</label>
            <input type="password" minlength="8" placeholder="Confirm Password">

           <a id="register-btn" href="registration_submitted.html">Register</a>
        </form>

        <!-- EMPLOYER FORM -->
        <form id="employerForm" class="account-form" action="submitted.html" method="POST">

             <div class="input-row">
                    <div class="field">
                        <label>First Name</label>
                        <input type="text" name="first_name" placeholder="Enter First Name">
                    </div>
                    <div class="field">
                        <label>Middle Name</label>
                        <input type="text" name="middle_name" placeholder="Enter Middle Initial">
                    </div>
                    <div class="field">
                        <label>Last Name</label>
                        <input type="text" name="last_name" placeholder="Enter Last Name">
                    </div>
                </div>
            
            <label>Department/Office</label>
            <select required>
			    <option>Library Department</option>
                <option>IT Office</option>
			    <option>Registrar</option>
                <option>Student Affairs</option>
			    <option>Research Office</option>
			    <option>Guidance Office</option>
                <option>MIS</option>
			    <option>Cashier</option>
			    <option>Health Service</option>
			    <option>Sports Office</option>
            </select>

            <label>Official WMSU Email</label> 
            <input type="email" placeholder="username@wmsu.edu.ph">

            <label>Password</label>
            <input type="password" minlength="8" placeholder="Enter Password">

            <label>Confirm Password</label>
            <input type="password" minlength="8" placeholder="Confirm Password">

           <a id="register-btn" href="registration_submitted.html">Register</a>
        </form>

        <!-- CPPESO FORM -->
        <form id="cppesoForm" class="account-form" action="registration_submitted.html">

            <div class="input-row">
                    <div class="field">
                        <label>First Name</label>
                        <input type="text" name="first_name" placeholder="Enter First Name">
                    </div>
                    <div class="field">
                        <label>Middle Name</label>
                        <input type="text" name="middle_name" placeholder="Enter Middle Initial">
                    </div>
                    <div class="field">
                        <label>Last Name</label>
                        <input type="text" name="last_name" placeholder="Enter Last Name">
                    </div>
                </div>

            <label> Email</label>
            <input type="email" placeholder="username@wmsu.edu.ph">

            <label>Password</label>
            <input type="password" placeholder="Create Password">

            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm Password">

            <label>Authorization Code</label>
            <input type="text" placeholder="Enter Authorization Code">

             <a id="register-btn" href="registration_submitted.html">Register</a>

        </form>
    </div>

</body>

</html>

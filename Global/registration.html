<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="registration.css">
    <script src="validation.js"></script>
</head>

<body>
    <!-- RADIO CONTROLS -->
    <input type="radio" name="role" id="student" class="role-select" checked>
    <input type="radio" name="role" id="employer" class="role-select">
    <input type="radio" name="role" id="cppeso" class="role-select">

    <div class="return-btn">
        <a href="../index.html"><i class="fa-solid fa-arrow-left"></i></a>
    </div>

    <div class="background"></div>

    <div class="container">
        <div class="form-wrapper">
        <header class="cppeso-header">
            <div class="header-content">
                <div class="title-area">
                    <h1>Create Account</h1>
                    <p>Fill in the details below to create your account</p>
                </div>
            </div>
        </header>


        <div class="register-card">
            <!-- STUDENT FORM -->
            <form id="studentForm" class="account-form" action="registration_submitted.html" method="POST" required>
                <div class="input-row">
                    <div class="field">
                        <label>First Name<span style="color: red;"> *</span></label>
                        <input type="text" name="first_name" placeholder="e.g. Juan" required>
                    </div>
                    <div class="field">
                        <label>Middle Name</label>
                        <input type="text" name="middle_name" placeholder="e.g. Santos (Optional)">
                    </div>
                    <div class="field">
                        <label>Last Name<span style="color: red;"> *</span></label>
                        <input type="text" name="last_name" placeholder="e.g. Dela Cruz" required>
                    </div>
                </div>

                
                <label>Official WMSU Email<span style="color: red;"> *</span></label>
                <input type="email" placeholder="e.g. username@wmsu.edu.ph" required>

                <div class="input-row">
                    <div class="field">
                        <label>Barangay<span style="color: red;"> *</span></label>
                        <input type="text" name="barangay" placeholder="e.g. San Roque" required>
                    </div>
                    <div class="field">
                        <label>Street/House No.<span style="color: red;"> *</span></label>
                        <input type="text" name="street" placeholder="e.g. House 123, Street 456" required>
                    </div>
                    <div class="field">
                        <label>City<span style="color: red;"> *</span></label>
                        <input type="text" name="city" placeholder="e.g. Zamboanga City" required>
                    </div>
                </div>

                <div class="row">
                    <div>
                        <label>Phone Number<span style="color: red;"> *</span></label>
                        <input type="text" inputmode="numeric" pattern="[0-9-]*" placeholder="e.g. 09123456789" required>
                    </div>
                     <div>
                        <label>Student ID<span style="color: red;"> *</span></label>
                        <input type="text" inputmode="numeric" pattern="[0-9-]*" placeholder="e.g. 2023-01234" required>
                    </div>
                </div>

            
                <div class="input-row">
                    <div class="field">
                        <label>Department<span style="color: red;"> *</span></label>
                        <select id="department" name="department" required>
                            <option value="" disabled selected>Select Department</option>
                            <option value="law">College of Law</option>
                            <option value="coa">College of Agricultue</option>
                            <option value="cla">College of Liberal Arts</option>
                            <option value="architecture">College of Architecture</option>
                            <option value="cn">College of Nursing</option> 
                            <option value="cais">College of Asian & Islamic Studies</option>
                            <option value="ccs">College of Computer Science</option>
                            <option value="cfes">College of Forestry & Environmental Studies</option>
                            <option value="ccje">College of Criminal Justice Education</option>
                            <option value="che">College of Home Economics</option>
                            <option value="coe">College of Engineering</option>
                            <option value="cm">College of Medicine</option>
                            <option value="cpads">College of Public Administration & Development Studies</option>
                            <option value="csspe">College of Sports Science & Physical Education</option>
                            <option value="csm">College of Science & Mathematics</option>
                            <option value="cswcd">College of Social Work & Community Development</option>
                            <option value="cte">College of Teacher Education</option>
                        </select>
                    </div>

                    <div class="field">
                            <label>Program</label>
                            <select id="program" name="program" required>
                                <option value="" disabled selected>Select Program</option>
                            </select>
                    </div> 
                    <div class="field">
                        <label>Year Level<span style="color: red;"> *</span></label>
                        <select required>
                            <option value="" disabled selected>Select Year</option>
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3">3rd Year</option>
                            <option value="4">4th Year</option>
                        </select>
                    </div>
        
                </div>

                <div class="upload-field">
                    <label class="upload-label">Upload COR <span style="color: red;"> *</span></label>
                    <div class="dropzone">
                        <label class="choose-btn" for="fileInput">Choose your files</label>
                        <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" required>
                        <span class="dropzone-text">No files chosen</span>
                    </div>
                </div>

                <label>Password<span style="color: red;"> *</span></label>
                <input type="password" minlength="8" placeholder="Enter Password" required>

                <label>Confirm Password<span style="color: red;"> *</span></label>
                <input type="password" minlength="8" placeholder="Confirm Password" required>

                <a id="register-btn" href="registration_submitted.html">Register</a>
            </form>
        </div>

       <script>
const programs = {
    law: ["BS Laws"],
    coa: [
        "BS Agriculture",
        "BS Food Technology",
        "BS Agribusiness",
        "Bachelor of Agricultural Technology"
    ],
    cais: ["Asian and Islamic Studies"],
    cfes: [
        "BS Forestry",
        "BS Agroforestry",
        "BS Environmental Science"
    ],
    ccje: ["Criminal Justice Education"],
    coe: [
        "Agricultural and Biosystems Engineering",
        "BS Civil Engineering",
        "BS Computer Engineering",
        "BS Electrical Engineering",
        "BS Electronics Engineering",
        "BS Environmental Engineering",
        "BS Geodetic Engineering",
        "BS Industrial Engineering",
        "BS Mechanical Engineering",
        "BS Sanitary Engineering"
    ],
    ccs: ["BSCS", "BSIT", "ACT AD", "ACT NT"],
    cn: ["BS Nursing"],
    architecture: ["BS Architecture"],
    cla: [
        "BS Accountancy",
        "BA History",
        "BA English",
        "BA Political Science",
        "BA Mass Communication - Journalism",
        "BA Mass Communication - Broadcasting",
        "BS Economics",
        "BS Psychology"
    ],
    che: [
        "BS Home Economics",
        "BS Nutrition & Dietetics",
        "BS Hospitality Management"
    ],
    cm: ["Doctor of Medicine"],
    cpads: ["BS Public Administration"],
    csspe: [
        "BS Physical Education",
        "BS Exercise & Sports Sciences"
    ],
    csm: [
        "BS Biology",
        "BS Chemistry",
        "BS Mathematics",
        "BS Statistics",
        "BS Physics"
    ],
    cswcd: [
        "BS Social Work",
        "BS Community Development"
    ],
    cte: [
        "Bachelor of Culture and Arts Education",
        "Bachelor of Early Childhood Education",
        "Bachelor of Elementary Education",
        "Bachelor of Secondary Education - English",
        "Bachelor of Secondary Education - Filipino",
        "Bachelor of Secondary Education - Mathematics",
        "Bachelor of Secondary Education - Sciences",
        "Bachelor of Secondary Education - Social Studies",
        "Bachelor of Secondary Education - Values Education",
        "Bachelor of Special Needs Education"
    ]
};

document.addEventListener("DOMContentLoaded", function () {
    const departmentSelect = document.getElementById("department");
    const programSelect = document.getElementById("program");

    departmentSelect.addEventListener("change", function () {
        const selected = this.value;

        // Reset program dropdown
        programSelect.innerHTML = '<option value="" disabled selected>Select Program</option>';

        if (programs[selected]) {
            programs[selected].forEach(prog => {
                const option = document.createElement("option");
                option.value = prog;
                option.textContent = prog;
                programSelect.appendChild(option);
            });
        }
    });
});
</script>
</body>  <!-- ← closing body tag goes AFTER the script -->
</html>

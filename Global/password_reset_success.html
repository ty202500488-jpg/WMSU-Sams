<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Successful | WMSU-SAMS</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .success-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #15803d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            margin-bottom: 10px;
        }
        .success-message h2 {
            color: #15803d;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .success-message p {
            color: #666;
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
        }
        .next-steps {
            background: #f0f9f0;
            border-left: 4px solid #15803d;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            font-size: 13px;
            color: #333;
        }
        .next-steps strong {
            display: block;
            margin-bottom: 8px;
            color: #15803d;
        }
        .action-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        .action-links a {
            padding: 12px;
            text-align: center;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .action-links .primary {
            background: #720b0b;
            color: white;
        }
        .action-links .primary:hover {
            background: #5a0915;
        }
        .action-links .secondary {
            background: #e0e0e0;
            color: #333;
        }
        .action-links .secondary:hover {
            background: #d0d0d0;
        }
    </style>
</head>

<body>
    <!-- Return button -->
    <div class="return-btn">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
    </div>

    <!-- Background -->
    <div class="background"></div>

    <div class="container">
        <div class="container-inner">
            <!-- Left side image/logo -->
            <div class="image">
                <div class="logo-container">
                    <div class="logo"></div>
                </div>
                <div class="signup-link">
                    <a href="login.html">Back to Login</a>
                </div>
            </div>

            <!-- Right side success message -->
            <div class="login-form">
                <div class="success-container">
                    <div class="success-icon">
                        <i class="fa-solid fa-check"></i>
                    </div>

                    <div class="success-message">
                        <h2 style="text-align: center;">Password Reset Successful!</h2>
                        <p>Your password has been successfully reset. You can now log in with your new credentials.</p>
                    </div>

                    <div class="next-steps">
                        <strong><i class="fa-solid fa-circle-info"></i> What's Next?</strong>
                        <p>Click the button below to return to the login page and sign in with your new password.</p>
                    </div>

                    <div class="action-links">
                        <a href="login.html" class="primary">
                            <i class="fa-solid fa-sign-in-alt"></i> Go to Login
                        </a>
                        <a href="../index.html" class="secondary">
                            <i class="fa-solid fa-home"></i> Return to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>

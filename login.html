<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sign-In</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <!-- Return button -->
    <div class="return-btn">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> </a>
    </div>

    <!-- Background -->
    <div class="background"></div>

    <div class="container">
        <div class="container-inner">
            <!-- Left side image/logo -->
            <div class="image">
                <div class="logo-container">
                    <div class="logo"></div>
                </div>
                <div class="signup-link">
                    <a href="registration.html">Don't have an account?</a>
                </div>
            </div>

            <!-- Right side login form -->
            <div class="login-form">
                <h1>Login</h1>

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="example@wmsu.edu.ph">

                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your Password">

                <button id="login">Login</button>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("login").addEventListener("click", () => {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            // Dummy accounts
            const accounts = [
                { type: "student", email: "student@wmsu.edu.ph", password: "student123", redirect: "student_dashboard.html" },
                { type: "employer", email: "employer@wmsu.edu.ph", password: "employer123", redirect: "employer_dashboard.html" },
                { type: "cppeso", email: "admin@wmsu.edu.ph", password: "admin123", redirect: "admin_dashboard.html" }
            ];

            // Match account
            const account = accounts.find(acc => acc.email === email && acc.password === password);

            if(account) {
                window.location.href = account.redirect;
            } else {
                alert("Invalid email or password.");
            }
        });
    </script>
</body>
</html>

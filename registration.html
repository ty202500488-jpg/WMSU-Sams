<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="registration.css">
</head>

<body>
    <div class="return-btn">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
    </div>
    <div class="background"></div>

    <div class="container">
        <div class="register-card">
            <h1>Create Account</h1>

            <!-- Account Type Buttons -->
            <div class="account-type">
                <button type="button" class="type-btn active" data-target="student">Student</button>
                <button type="button" class="type-btn" data-target="employer">Employer</button>
                <button type="button" class="type-btn" data-target="cppeso">CPPESO</button>
            </div>

            <!-- Student Form -->
            <form id="studentForm" class="account-form" action="registration_submitted.html">
                <label for="studentName">Full Name</label>
                <input type="text" id="studentName" placeholder="Enter Full Name" required>

                <label for="studentEmail">Official WMSU Email</label>
                <input type="email" id="studentEmail" placeholder="example@wmsu.edu.ph" required>

                <label for="studentPassword">Password</label>
                <input type="password" id="studentPassword" placeholder="Enter Password" required>

                <label for="confirmStudentPassword">Confirm Password</label>
                <input type="password" id="confirmStudentPassword" placeholder="Confirm Password" required>

                <button type="submit" id="register-btn">Register</button>
            </form>

            <!-- Employer Form -->
            <form id="employerForm" class="account-form" action="registration_submitted.html">
                <label for="empName">Full Name</label>
                <input type="text" id="empName" placeholder="Enter Full Name" required>

                <label for="empEmail">Official WMSU Email</label>
                <input type="email" id="empEmail" placeholder="example@wmsu.edu.ph" required>

                <label for="empPassword">Password</label>
                <input type="password" id="empPassword" placeholder="Enter Password" required>

                <label for="confirmEmpPassword">Confirm Password</label>
                <input type="password" id="confirmEmpPassword" placeholder="Confirm Password" required>

                <button type="submit" id="register-btn">Register</button>
            </form>

            <!-- CPPESO Form -->
            <form id="cppesoForm" class="account-form" action="registration_submitted.html">
                <label for="cppesoName">Full Name</label>
                <input type="text" id="cppesoName" placeholder="Enter Full Name" required>

                <label for="cppesoEmail">Official WMSU Email</label>
                <input type="email" id="cppesoEmail" placeholder="example@wmsu.edu.ph" required>

                <label for="cppesoPassword">Password</label>
                <input type="password" id="cppesoPassword" placeholder="Enter Password" required>

                <label for="confirmCppesoPassword">Confirm Password</label>
                <input type="password" id="confirmCppesoPassword" placeholder="Confirm Password" required>

                <button type="submit" id="register-btn">Register</button>
            </form>

            <a href="login.html">Already have an account? Login</a>
        </div>
    </div>

    <script>
        const buttons = document.querySelectorAll(".type-btn");
        const forms = {
            student: document.getElementById("studentForm"),
            employer: document.getElementById("employerForm"),
            cppeso: document.getElementById("cppesoForm")
        };

        // Hide all forms, show only default
        Object.values(forms).forEach(f => f.style.display = "none");
        forms.student.style.display = "flex";

        // Switch forms on button click
        buttons.forEach(btn => {
            btn.addEventListener("click", () => {
                buttons.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");

                const target = btn.dataset.target;
                Object.entries(forms).forEach(([key, form]) => {
                    form.style.display = (key === target) ? "flex" : "none";
                });
            });
        });

        // Optional: Password confirmation validation
        document.querySelectorAll(".account-form").forEach(form => {
            form.addEventListener("submit", e => {
                const pwd = form.querySelector('input[type="password"]:nth-of-type(1)');
                const confirmPwd = form.querySelector('input[type="password"]:nth-of-type(2)');
                if (pwd.value !== confirmPwd.value) {
                    e.preventDefault();
                    alert("Passwords do not match!");
                }
            });
        });
    </script>
</body>

</html>
